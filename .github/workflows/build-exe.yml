name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:          # 允许手动触发

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install pyqt6 pyinstaller

      - name: 安装 UPX (压缩 EXE)
        run: |
          curl -L -o upx.zip https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip
          7z x upx.zip -o"C:\upx" -y
          echo "C:\upx\upx-4.2.4-win64" >> $env:GITHUB_PATH

      - name: 打包为 EXE
        run: |
          pyinstaller --onefile --windowed --name "mm-mil-converter" --upx-dir "C:\upx\upx-4.2.4-win64" mm_mil_converter.py

      - name: 上传 EXE 制品
        uses: actions/upload-artifact@v4
        with:
          name: mm-mil-converter
          path: dist/mm-mil-converter.exe
          retention-days: 90
